name: Feature request
description: Propose a ResearchForge capability as test-first behavior.
title: "[Feature] "
labels: ["feature", "needs-slice"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research workflow problem does this solve?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Proposed behavior
      description: Describe the smallest observable behavior.
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Provenance and reproducibility impact
      description: What must be logged, cited, locked, or exported for auditability?
    validations:
      required: true
  - type: textarea
    id: tdd
    attributes:
      label: TDD acceptance test
      description: What failing test or golden fixture proves this feature?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
