name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: TODO decision audit
        run: make todo-completion-audit
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Vulnerability check
        run: govulncheck ./...
      - name: Dependency metadata scan
        run: go list -m all
      - name: License metadata scan
        run: go list -m -json all
      - name: Diff check
        run: git diff --check
