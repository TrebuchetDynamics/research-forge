<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">ResearchForge — auditable research from the command line</title>
  <desc id="desc">A technical research ledger showing ResearchForge turning scholarly source queries into normalized records, provenance files, and replayable review artifacts.</desc>

  <rect width="1200" height="390" rx="22" fill="#0F1115"/>
  <path d="M0 316H1200" stroke="#2B313A"/>
  <path d="M700 0V316" stroke="#2B313A"/>

  <g transform="translate(58 48)">
    <text x="0" y="0" fill="#FF6B35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" letter-spacing="2">LOCAL-FIRST / EVIDENCE ENGINE</text>
    <text x="0" y="82" fill="#F4F0E8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="760" letter-spacing="-3">ResearchForge</text>
    <text x="0" y="132" fill="#F4F0E8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="520">Search broadly. Keep the trail.</text>
    <text x="0" y="176" fill="#9DA7B2" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Scholarly discovery, legal OA acquisition, citations,</text>
    <text x="0" y="204" fill="#9DA7B2" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">and replayable review packages — one Go CLI.</text>

    <g transform="translate(0 242)">
      <rect width="162" height="34" rx="17" fill="#1A1F26" stroke="#343B46"/>
      <text x="18" y="22" fill="#DCE1E6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">CLI / rforge</text>
      <rect x="174" width="106" height="34" rx="17" fill="#1A1F26" stroke="#343B46"/>
      <text x="189" y="22" fill="#DCE1E6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">GO / SQLITE</text>
      <rect x="292" width="102" height="34" rx="17" fill="#1A1F26" stroke="#343B46"/>
      <text x="315" y="22" fill="#DCE1E6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">MIT</text>
    </g>
  </g>

  <g transform="translate(742 42)">
    <text x="0" y="0" fill="#9DA7B2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="1.5">TRACKED RUN / OPEN-SOURCE TOOLS</text>

    <g transform="translate(0 25)">
      <rect width="400" height="92" rx="10" fill="#151A20" stroke="#343B46"/>
      <text x="22" y="28" fill="#FF6B35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700">DISCOVERY RECEIPT</text>
      <text x="22" y="59" fill="#F4F0E8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="700">280 records → 237 deduped</text>
      <text x="22" y="80" fill="#9DA7B2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">QUERY 06  ·  SOURCE 04  ·  MANIFEST 01</text>
    </g>

    <g transform="translate(0 135)">
      <path d="M12 0V102" stroke="#FF6B35" stroke-width="2"/>
      <circle cx="12" cy="9" r="5" fill="#FF6B35"/>
      <circle cx="12" cy="49" r="5" fill="#0F1115" stroke="#6E7782" stroke-width="2"/>
      <circle cx="12" cy="89" r="5" fill="#0F1115" stroke="#6E7782" stroke-width="2"/>

      <text x="34" y="14" fill="#F4F0E8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">results-deduped.jsonl</text>
      <text x="34" y="34" fill="#78828E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">normalized paper records</text>
      <text x="34" y="54" fill="#F4F0E8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">manifest.json + failures.jsonl</text>
      <text x="34" y="74" fill="#78828E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">query, source, count, failure trail</text>
      <text x="34" y="94" fill="#F4F0E8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">CITATIONS.md / review.rforgepkg</text>
      <text x="34" y="114" fill="#78828E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">citable output or auditable package</text>
    </g>
  </g>

  <g transform="translate(58 348)">
    <text x="0" y="0" fill="#737E89" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">RETRIEVAL-FIRST</text>
    <text x="170" y="0" fill="#505964" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">/</text>
    <text x="192" y="0" fill="#737E89" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">PROVENANCE-FIRST</text>
    <text x="382" y="0" fill="#505964" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">/</text>
    <text x="404" y="0" fill="#737E89" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">STATISTICS-FIRST</text>
    <text x="1010" y="0" fill="#FF6B35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700">AUDIT / REPLAY</text>
  </g>
</svg>
